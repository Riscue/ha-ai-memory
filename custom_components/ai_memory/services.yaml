add_memory:
  name: Add Memory
  description: Add a new entry to AI memory
  fields:
    text:
      name: Text
      description: The text content to remember
      required: true
      example: "User prefers dark mode and hates bright colors"
      selector:
        text:
          multiline: true

clear_memory:
  name: Clear Memory
  description: Clear all entries from AI memory

list_memories:
  name: List Memories
  description: List all available AI memories with their details
  response:
    type: "dict"
    required: true

delete_memory:
  name: Delete Memory
  description: Delete a specific memory by ID
  fields:
    memory_id:
      name: Memory ID
      description: The ID of the memory to delete
      required: true
      selector:
        text:
