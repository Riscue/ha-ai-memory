add_memory:
  name: Add Memory
  description: Add a new entry to AI memory
  fields:
    text:
      name: Text
      description: The text content to remember
      required: true
      selector:
        text:
          multiline: true
    room:
      name: Room
      description: Optional room name for grouping related memories (e.g., camera_events, user_preferences)
      required: false
      selector:
        text:
    wing:
      name: Wing
      description: Optional wing name for broader categorization (e.g., security, automation)
      required: false
      selector:
        text:

list_memories:
  name: List Memories
  description: List all available AI memories with their details
  response:
    type: "dict"
    required: true

delete_memory:
  name: Delete Memory
  description: Delete memory by room/wing
  fields:
    room:
      name: Room
      description: Delete all memories in this room
      required: false
      selector:
        text:
    wing:
      name: Wing
      description: Delete all memories in this wing
      required: false
      selector:
        text:
    scope:
      name: Scope
      description: Filter by scope (private or common)
      required: false
      selector:
        select:
          options:
            - label: Private
              value: "private"
            - label: Common
              value: "common"
    agent_id:
      name: Agent ID
      description: Filter by agent ID (required to delete private memories)
      required: false
      selector:
        text:
